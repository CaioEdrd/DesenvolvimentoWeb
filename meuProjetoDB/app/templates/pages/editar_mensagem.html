{% extends "base.html" %}

{% block content %}
<h1>Editar Mensagem</h1>

<form method="POST">
    <input type="text" name="titulo" value="{{ mensagem.titulo }}" class="form-control mb-2" required>
    <textarea name="conteudo" class="form-control mb-2">{{ mensagem.conteudo }}</textarea>

    <select name="usuario_id" class="form-select mb-2">
        {% for u in usuarios %}
            <option value="{{ u.id }}"
            {% if u.id == mensagem.usuario_id %}selected{% endif %}>
                {{ u.nome }}
            </option>
        {% endfor %}
    </select>

    <button type="submit" class="btn btn-success">Salvar</button>
</form>

{% endblock %}
