{% extends "base.html" %}

{% block content %}
<h1>Mensagens</h1>

<form method="POST">
    <input type="text" name="titulo" placeholder="Título" required class="form-control mb-2">
    <textarea name="conteudo" required class="form-control mb-2"></textarea>

    <select name="usuario_id" required class="form-select mb-2">
        {% for u in usuarios %}
            <option value="{{ u.id }}">{{ u.nome }}</option>
        {% endfor %}
    </select>

    <button type="submit"  class="btn btn-success">Enviar</button>
</form>

<hr>

{% if mensagens %}
    {% for m in mensagens %}
        <div class="card mb-3">
          <div class="card-body">
                <h3 class="card-title">{{ m.titulo }}</h3>
                <p class="card-text">{{ m.conteudo }}</p>
                <small class="text-muted">{{ m.usuario.nome }}</small><br><br>

                <a href="/mensagens/editar/{{ m.id }}" class="link-primary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">Editar</a> | 
                <a href="/mensagens/excluir/{{ m.id }}" class="link-danger link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">Excluir</a>
            </div>  
        </div>
    {% endfor %}
{% else %}
    <p>Nenhuma mensagem cadastrada.</p>
{% endif %}

{% endblock %}
